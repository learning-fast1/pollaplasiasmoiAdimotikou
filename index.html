<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Παιχνίδι Πολλαπλασιασμού - Α' Δημοτικού</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen active">
            <div class="header">
                <img src="logo.png" id="logo" alt="logo">
                <h1>Μαθαίνω τον<br><span>Πολλαπλασιασμό!</span></h1>
            </div>
            
            <div class="menu-options">
                <button class="btn menu-btn mode-012" data-mode="012">
                    <span class="btn-icon">🦁</span>
                    <span class="btn-text">Πίνακες 0, 1, 2</span>
                </button>
                <button class="btn menu-btn mode-345" data-mode="345">
                    <span class="btn-icon">🐘</span>
                    <span class="btn-text">Πράξεις 3, 4, 5</span>
                </button>
                <button class="btn menu-btn mode-all" data-mode="all">
                    <span class="btn-icon">🚀</span>
                    <span class="btn-text">Όλα Μαζί</span>
                </button>
            </div>
            
            <div class="menu-footer">
                <p>Διάλεξε ένα από τα παραπάνω για να ξεκινήσουμε!</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="top-bar">
                <button id="back-btn" class="btn small-btn">🏠 Πίσω</button>
                <div class="score-container">
                    <span>Σκορ:</span>
                    <span id="score">0</span>
                    <span class="score-star">⭐</span>
                </div>
            </div>

            <div class="game-area">
                <div class="question-container">
                    <div id="question">2 x 3</div>
                    <div class="equals">=</div>
                    <div class="question-mark">?</div>
                </div>

                <div id="options-container" class="options-grid">
                    <!-- Option buttons will be generated here by JS -->
                </div>
            </div>
            
            <div id="feedback-area" class="feedback-area hidden">
                <div id="feedback-icon" class="feedback-icon"></div>
                <div id="feedback-text" class="feedback-text"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
