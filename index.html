<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Εξάσκηση Προπαίδειας - Α' Δημοτικού</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2;family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6MPX8SLSYM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-6MPX8SLSYM');
    </script>
</head>
<body>
    <div id="app">

        <!-- Main Menu -->
        <div id="menu-screen" class="screen active">
            <div class="header">
                <img src="logo.png" id="logo" alt="logo">
                <div class="header-title-block">
                    <h1>Εξάσκηση στις προπαίδειες!</h1>
                    <span class="subtitle">Α' δημοτικού</span>
                </div>
            </div>

            <div class="player-selection">
                <button class="btn player-count-btn selected" id="btn-1p">👤 1 Παίκτης</button>
                <button class="btn player-count-btn" id="btn-2p">👥 2 Παίκτες</button>
            </div>

            <div class="time-selection">
                <span class="selection-label">⏱ Χρόνος:</span>
                <div class="time-buttons">
                    <button class="btn time-btn" data-time="30">30''</button>
                    <button class="btn time-btn selected" data-time="60">1'</button>
                    <button class="btn time-btn" data-time="120">2'</button>
                    <button class="btn time-btn" data-time="180">3'</button>
                    <button class="btn time-btn" data-time="300">5'</button>
                </div>
            </div>

            <div class="menu-options">
                <button class="btn menu-btn mode-012" data-mode="012">
                    <span class="btn-text">Προπαίδειες 0, 1, 2</span>
                </button>
                <button class="btn menu-btn mode-345" data-mode="345">
                    <span class="btn-text">Προπαίδειες 3, 4, 5</span>
                </button>
                <button class="btn menu-btn mode-all" data-mode="all">
                    <span class="btn-text">Προπαίδειες 0, 1, 2, 3, 4, 5</span>
                </button>
            </div>

            <div class="menu-footer">
                <p>Διάλεξε αριθμό παικτών και επίπεδο!</p>
            </div>
        </div>

        <!-- Single Player Screen -->
        <div id="game-screen" class="screen">
            <div class="top-bar">
                <button id="back-btn" class="btn small-btn">🏠 Πίσω</button>
                <div id="timer-display" class="timer-display">1:00</div>
                <div class="score-container">
                    <span>Σκορ:</span>
                    <span id="score">0</span>
                    <span class="score-star">⭐</span>
                </div>
            </div>

            <div class="game-area">
                <div class="question-container">
                    <div id="question" class="question-text">2 × 3</div>
                    <div class="equals">=</div>
                    <div id="answer-display" class="answer-display">;</div>
                </div>

                <div id="feedback-inline" class="feedback-inline hidden"></div>

                <div class="numpad">
                    <button class="numpad-btn" data-val="7">7</button>
                    <button class="numpad-btn" data-val="8">8</button>
                    <button class="numpad-btn" data-val="9">9</button>
                    <button class="numpad-btn" data-val="4">4</button>
                    <button class="numpad-btn" data-val="5">5</button>
                    <button class="numpad-btn" data-val="6">6</button>
                    <button class="numpad-btn" data-val="1">1</button>
                    <button class="numpad-btn" data-val="2">2</button>
                    <button class="numpad-btn" data-val="3">3</button>
                    <button class="numpad-btn numpad-del" data-val="del">⌫</button>
                    <button class="numpad-btn" data-val="0">0</button>
                    <button class="numpad-btn numpad-ok" data-val="ok">✓</button>
                </div>
            </div>
        </div>

        <!-- Two Player Screen -->
        <div id="two-player-screen" class="screen">
            <div class="two-player-topbar">
                <button id="back-btn-2p" class="btn small-btn">🏠 Πίσω</button>
                <div id="timer-display-2p" class="timer-display">1:00</div>
            </div>

            <div class="two-player-area">
                <!-- Player 1 -->
                <div class="player-panel" id="panel-1">
                    <div class="panel-header p1-header">
                        <span class="player-label">🔵 Παίκτης 1</span>
                        <span class="panel-score">Σκορ: <span id="score-p1">0</span> ⭐</span>
                    </div>
                    <div class="question-container">
                        <div id="question-p1" class="question-text">2 × 3</div>
                        <div class="equals">=</div>
                        <div id="answer-p1" class="answer-display">;</div>
                    </div>
                    <div id="feedback-p1" class="feedback-inline hidden"></div>
                    <div class="numpad">
                        <button class="numpad-btn" data-player="1" data-val="7">7</button>
                        <button class="numpad-btn" data-player="1" data-val="8">8</button>
                        <button class="numpad-btn" data-player="1" data-val="9">9</button>
                        <button class="numpad-btn" data-player="1" data-val="4">4</button>
                        <button class="numpad-btn" data-player="1" data-val="5">5</button>
                        <button class="numpad-btn" data-player="1" data-val="6">6</button>
                        <button class="numpad-btn" data-player="1" data-val="1">1</button>
                        <button class="numpad-btn" data-player="1" data-val="2">2</button>
                        <button class="numpad-btn" data-player="1" data-val="3">3</button>
                        <button class="numpad-btn numpad-del" data-player="1" data-val="del">⌫</button>
                        <button class="numpad-btn" data-player="1" data-val="0">0</button>
                        <button class="numpad-btn numpad-ok" data-player="1" data-val="ok">✓</button>
                    </div>
                </div>

                <div class="panel-divider"></div>

                <!-- Player 2 -->
                <div class="player-panel" id="panel-2">
                    <div class="panel-header p2-header">
                        <span class="player-label">🔴 Παίκτης 2</span>
                        <span class="panel-score">Σκορ: <span id="score-p2">0</span> ⭐</span>
                    </div>
                    <div class="question-container">
                        <div id="question-p2" class="question-text">5 × 4</div>
                        <div class="equals">=</div>
                        <div id="answer-p2" class="answer-display">;</div>
                    </div>
                    <div id="feedback-p2" class="feedback-inline hidden"></div>
                    <div class="numpad">
                        <button class="numpad-btn" data-player="2" data-val="7">7</button>
                        <button class="numpad-btn" data-player="2" data-val="8">8</button>
                        <button class="numpad-btn" data-player="2" data-val="9">9</button>
                        <button class="numpad-btn" data-player="2" data-val="4">4</button>
                        <button class="numpad-btn" data-player="2" data-val="5">5</button>
                        <button class="numpad-btn" data-player="2" data-val="6">6</button>
                        <button class="numpad-btn" data-player="2" data-val="1">1</button>
                        <button class="numpad-btn" data-player="2" data-val="2">2</button>
                        <button class="numpad-btn" data-player="2" data-val="3">3</button>
                        <button class="numpad-btn numpad-del" data-player="2" data-val="del">⌫</button>
                        <button class="numpad-btn" data-player="2" data-val="0">0</button>
                        <button class="numpad-btn numpad-ok" data-player="2" data-val="ok">✓</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over" class="game-over-overlay hidden">
            <div class="game-over-box">
                <div id="game-over-title" class="game-over-title">⏰ Τελείωσε ο χρόνος!</div>
                <div id="game-over-scores" class="game-over-scores"></div>
                <div class="game-over-buttons">
                    <button id="review-btn" class="btn menu-btn mode-345" style="display:none">📝 Επανάληψη Λαθών</button>
                    <button id="play-again-btn" class="btn menu-btn mode-all">🔄 Παίξε Ξανά</button>
                    <button id="go-menu-btn" class="btn menu-btn mode-012">🏠 Μενού</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
